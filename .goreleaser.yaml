# .goreleaser.yaml
version: 2
project_name: eko

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=1
    tags:
      - no_gui
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

brews:
  - name: eko
    repository:
      owner: kavix
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/kavix/eko"
    description: "Eko: AI-powered snapshot versioning CLI"
    install: |
      bin.install "eko"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
